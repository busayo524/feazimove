<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Canonical-origin guard: if served from the bare domain (or plain HTTP),
      // hop to the secure www origin the API trusts — preserves the full path.
      (function () {
        var h = location.hostname
        if (h === 'feazimove.com' || (h === 'www.feazimove.com' && location.protocol === 'http:')) {
          location.replace('https://www.feazimove.com' + location.pathname + location.search + location.hash)
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Headers via meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self)" />
    <!-- CSP: tighten further in nginx/CDN config for production -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://api.mapbox.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.catalystappsail.com https://api.feazimove.com https://api.mapbox.com https://events.mapbox.com https://*.tiles.mapbox.com https://api-js.mixpanel.com; worker-src 'self' blob:;" />

    <!-- Warm up the API connection (DNS + TLS) while the page is still loading -->
    <link rel="preconnect" href="https://feazimove-api-10128445142.catalystappsail.com" crossorigin />

    <!-- SEO -->
    <title>FeaziMove — Smart Urban Mobility for African Cities</title>
    <meta name="description" content="FeaziMove connects commuters and goods moving along shared routes through pooled transport — making everyday movement feasible, affordable, and easy. The Feazi Way." />
    <meta name="keywords" content="FeaziMove, urban mobility, shared transport, Africa, Lagos, pooled rides, logistics" />
    <meta property="og:title" content="FeaziMove — Making Mobility Feasible" />
    <meta property="og:description" content="Smart urban mobility platform built for African cities." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.feazimove.com/app/" />
    <meta property="og:image" content="https://www.feazimove.com/app/pwa-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.feazimove.com/app/pwa-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@800;900&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Google Search requires favicon dimensions that are a multiple of 48px;
         the 192px icon is what appears next to the domain in search results -->
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#1a2400" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FeaziMove" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
